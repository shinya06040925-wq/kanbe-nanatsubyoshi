<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>かんべ ななつ拍子｜ゲームサンプル</title>
<style>
:root{--red:#ef3f32;--blue:#1597cc;--gold:#ffd34e;--cream:#fff7dc;--ink:#2b1712}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;min-height:100svh;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;color:var(--ink);background:radial-gradient(circle at 15% 8%,#ffce45 0 2px,transparent 3px),radial-gradient(circle at 80% 12%,#4ad7ff 0 2px,transparent 3px),linear-gradient(#101753 0 38%,#6b1728 38% 52%,#f6d37b 52% 100%);background-size:90px 90px,120px 120px,auto;overflow-x:hidden}
body:before{content:"🏮　🏮　🏮　🏮　🏮　🏮";position:fixed;top:0;left:0;right:0;text-align:center;font-size:clamp(24px,6vw,44px);letter-spacing:.12em;z-index:-1;filter:drop-shadow(0 4px 8px #000)}
.wrap{width:min(820px,100%);margin:auto;padding:18px 12px calc(24px + env(safe-area-inset-bottom))}
.header{text-align:center;color:#fff;text-shadow:0 4px 0 #5e130d,0 0 12px #ffcf38;margin-top:18px}
.header h1{margin:8px 0 0;font-size:clamp(34px,9vw,62px);letter-spacing:.05em;color:#ff5b32;-webkit-text-stroke:2px #fff}
.header p{margin:4px 0 14px;font-weight:900;font-size:clamp(15px,4vw,21px);color:#fff7a8}
.card{background:var(--cream);border:5px solid #5d1b12;border-radius:24px;box-shadow:0 10px 0 rgba(0,0,0,.35);overflow:hidden}
.status{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px;background:linear-gradient(90deg,#b51116,#ef4b24,#b51116);border-bottom:4px solid #ffcf45;text-align:center;font-weight:900;color:#fff}
.status div{background:rgba(0,0,0,.22);border-radius:12px;padding:4px}
.status strong{display:block;font-size:clamp(21px,6vw,34px);color:#ffe85d;text-shadow:0 3px #4d130b}
.game{position:relative;height:270px;background:linear-gradient(rgba(8,12,38,.32),rgba(8,12,38,.7)),radial-gradient(circle at 15% 20%,#ffec63 0 2px,transparent 3px),radial-gradient(circle at 78% 18%,#59d5ff 0 2px,transparent 3px),linear-gradient(#182562,#32163e);overflow:hidden}
.game:before{content:"🎆　　　　🎇　　　　🎆";position:absolute;top:0;left:0;right:0;text-align:center;font-size:54px;opacity:.8}
.game:after{content:"🏮🏮🏮🏮🏮🏮🏮🏮🏮🏮";position:absolute;left:0;right:0;bottom:5px;text-align:center;font-size:27px;letter-spacing:7px;opacity:.9}
.lane{position:absolute;left:0;right:0;top:78px;height:124px;background:linear-gradient(90deg,rgba(0,0,0,.83),rgba(40,40,40,.9));border-top:4px solid #f4c74d;border-bottom:4px solid #f4c74d;box-shadow:0 0 14px #f2a92f}
.hitline{position:absolute;left:88px;top:68px;width:9px;height:144px;background:var(--gold);box-shadow:0 0 18px var(--gold);border-radius:8px;z-index:2}
.target{position:absolute;left:55px;top:94px;width:72px;height:72px;border:7px solid #ffe66b;border-radius:50%;background:rgba(255,255,255,.12);box-shadow:0 0 18px #ffca34 inset;z-index:2}
.note{position:absolute;top:99px;width:66px;height:66px;border-radius:50%;border:6px solid #fff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:25px;font-weight:1000;color:#111;box-shadow:0 5px 0 rgba(0,0,0,.45);line-height:.8;z-index:3}
.note:before{content:"•ᴗ•";font-size:20px;line-height:1;color:#161616}.note small{font-size:12px;color:#fff;text-shadow:0 2px #000;margin-top:4px;letter-spacing:.04em}
.note.don{background:var(--red)}.note.ka{background:var(--blue)}
.elapsed-time{position:absolute;right:12px;top:12px;z-index:5;
background:rgba(0,0,0,.62);border:2px solid #ffe85d;border-radius:10px;
padding:5px 9px;color:#fff;font-size:15px;font-weight:900;
font-variant-numeric:tabular-nums;text-shadow:0 2px #000}
.message{position:absolute;left:0;right:0;top:15px;text-align:center;font-size:28px;font-weight:1000;color:#fff;text-shadow:0 4px #000;min-height:38px;z-index:4}
.progress{height:13px;background:#2b1720;border-top:2px solid #ffd45b}.progress>div{height:100%;width:0;background:linear-gradient(90deg,#ff513c,#ffd33f)}
.controls{padding:15px;background:repeating-linear-gradient(0deg,#fff7dc 0 22px,#f5e5b8 23px 24px)}
.start{width:100%;border:3px solid #fff3a8;border-radius:17px;padding:15px;font-size:21px;font-weight:1000;color:white;background:linear-gradient(#d82e24,#96140f);box-shadow:0 6px 0 #5d130d;margin-bottom:14px}
.start:disabled{opacity:.72}.start:active{transform:translateY(4px);box-shadow:0 2px 0 #5d130d}
.pads{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pad{position:relative;height:132px;border-radius:24px;border:7px solid #fff;box-shadow:0 8px 0 rgba(0,0,0,.3),inset 0 -10px 0 rgba(0,0,0,.12);color:#fff;font-size:0;font-weight:1000;touch-action:manipulation;overflow:hidden}
.pad:before{content:"•ᴗ•";display:block;font-size:35px;color:#111;line-height:1;margin-top:18px}.pad small{display:block;font-size:27px;color:#fff;text-shadow:0 3px #000;margin-top:6px}.pad:after{display:block;font-size:14px;margin-top:2px;font-weight:900}
.pad.don{background:radial-gradient(circle at 50% 45%,#ff6658,#dc201a 68%)}.pad.ka{background:radial-gradient(circle at 50% 45%,#4ecaf0,#087eae 68%)}
.pad.don:after{content:"あかのたいこ"}.pad.ka:after{content:"あおのたいこ"}
.pad:active,.pad.active{transform:translateY(5px) scale(.98);box-shadow:0 3px 0 rgba(0,0,0,.3);filter:brightness(1.25)}
.help{font-size:14px;line-height:1.65;padding:4px 4px 0;text-align:center;font-weight:700}
.badge{display:inline-block;background:#ffdd55;border:3px solid #a72a19;border-radius:999px;padding:3px 12px;font-weight:1000;color:#7b180f}
@media(max-width:480px){.wrap{padding-left:7px;padding-right:7px}.game{height:245px}.lane{top:72px}.note{top:93px}.target{top:88px}.hitline{top:62px}.pad{height:120px}.pad small{font-size:24px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="header"><h1>ときわのたつじん</h1><p>🎆 かんべ　ななつびょうし 🎆</p></header>
  <main class="card">
    <section class="status">
      <div>スコア<strong id="score">0</strong></div>
      <div>コンボ<strong id="combo">0</strong></div>
      <div>最高<strong id="maxCombo">0</strong></div>
    </section>
    <section class="game" id="game">
      <div class="elapsed-time">経過時間 <span id="elapsed">00:00.0</span></div>
      <div class="message" id="message">スタートを押してください</div>
      <div class="lane"></div><div class="hitline"></div><div class="target"></div>
      <div id="notes"></div>
    </section>
    <div class="progress"><div id="progress"></div></div>
    <section class="controls">
      <div style="display:flex;gap:8px;margin-bottom:14px">
<button class="start" id="start" style="margin-bottom:0;flex:1">▶ スタート</button>
<button class="start" id="pause" style="margin-bottom:0;flex:0.7;background:linear-gradient(#f0ad00,#b57d00)">⏸ 一時停止</button>
<button class="start" id="stop" style="margin-bottom:0;flex:0.7;background:linear-gradient(#666,#333)">⏹ 停止</button>
</div>
      <div class="pads">
        <button class="pad don" id="don" aria-label="あかのたいこ ひだり"><small>ひだり</small></button>
        <button class="pad ka" id="ka" aria-label="あおのたいこ みぎ"><small>みぎ</small></button>
      </div>
      <p class="help"><span class="badge">遊び方</span><br>あかのたいこは「ひだり」、あおのたいこは「みぎ」です。<br>おんぷが きいろいせんに かさなったら、同じいろのボタンをおしてください。</p>
    </section>
  </main>
</div>

let audio = null;
const donSoundPool = Array.from({length: 8}, () => {
  const sound = new Audio('don.mp3');
  sound.preload = 'auto';
  sound.playsInline = true;
  return sound;
});
let donSoundIndex = 0;
function playDonSound(){
  const sound = donSoundPool[donSoundIndex];
  donSoundIndex = (donSoundIndex + 1) % donSoundPool.length;
  sound.currentTime = 0;
  const promise = sound.play();
  if (promise) promise.catch(() => {});
}
function createEmbeddedAudio() {
  if (audio) return audio;
  const binary = atob(AUDIO_BASE64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const blob = new Blob([bytes], {type:'audio/mpeg'});
  audio = new Audio(URL.createObjectURL(blob));
  audio.preload = 'auto';
  audio.playsInline = true;
  audio.setAttribute('playsinline','');
  audio.setAttribute('webkit-playsinline','');
  audio.addEventListener('ended',()=>{
    running=false;
    message.textContent=`終了！ スコア ${score}`;
    startBtn.textContent='↻ もう一度遊ぶ';
  });
  audio.addEventListener('error',()=>{
    message.textContent='音源を読み込めませんでした';
    startBtn.textContent='▶ もう一度スタート';
  });
  return audio;
}
const notesLayer = document.getElementById('notes');
const game = document.getElementById('game');
const message = document.getElementById('message');
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
const maxComboEl = document.getElementById('maxCombo');
const elapsedEl = document.getElementById('elapsed');
const progress = document.getElementById('progress');
const startBtn = document.getElementById('start');
let state=[], running=false, score=0, combo=0, maxCombo=0, raf=0;
const travel=3.0, hitX=88;
function reset(){cancelAnimationFrame(raf);notesLayer.innerHTML='';score=combo=maxCombo=0;updateScore();state=chart.map((n,i)=>{const el=document.createElement('div');el.className='note '+n.type;el.innerHTML=`<small>${n.type==='don'?'ひだり':'みぎ'}</small>`;notesLayer.appendChild(el);return {...n,el,hit:false,miss:false};});progress.style.width='0%';elapsedEl.textContent='00:00.0';message.textContent='準備…'}
function updateScore(){scoreEl.textContent=score;comboEl.textContent=combo;maxComboEl.textContent=maxCombo}
function formatElapsed(seconds){
  const minutes=Math.floor(seconds/60);
  const secs=Math.floor(seconds%60);
  const tenths=Math.floor((seconds-Math.floor(seconds))*10);
  return String(minutes).padStart(2,'0')+':'+String(secs).padStart(2,'0')+'.'+tenths;
}
function judge(type){if(!running||!audio)return;const now=audio.currentTime;let best=null,dist=999;for(const n of state){if(n.hit||n.miss||n.type!==type)continue;const d=Math.abs(n.time-now);if(d<dist){dist=d;best=n}}if(!best||dist>.24){combo=0;message.textContent='不可';updateScore();flash(type);return}best.hit=true;best.el.remove();let add;if(dist<=.07){message.textContent='良';add=1000}else if(dist<=.14){message.textContent='可';add=500}else{message.textContent='惜しい';add=200}combo++;maxCombo=Math.max(maxCombo,combo);score+=add+combo*10;updateScore();flash(type)}
function flash(type){const b=document.getElementById(type);b.classList.add('active');setTimeout(()=>b.classList.remove('active'),90)}
function frame(){if(!audio)return;const now=audio.currentTime;elapsedEl.textContent=formatElapsed(now);const w=game.clientWidth;for(const n of state){if(n.hit||n.miss)continue;const dt=n.time-now;const x=hitX+(dt/travel)*(w-hitX+70);n.el.style.transform=`translateX(${x}px)`;if(dt<-.25){n.miss=true;n.el.remove();combo=0;message.textContent='不可';updateScore()}}progress.style.width=((now/(audio.duration||43.1))*100)+'%';if(!audio.paused&&!audio.ended){raf=requestAnimationFrame(frame)}else if(audio.ended){running=false;message.textContent=`終了！ スコア ${score}`;startBtn.textContent='↻ もう一度遊ぶ'}}
let starting=false;
async function start(e){
  if(e){e.preventDefault();e.stopPropagation()}
  if(starting)return;
  starting=true;
  reset();
  startBtn.disabled=true;
  startBtn.textContent='音源を準備中…';
  message.textContent='タップ操作を確認しています…';
  try{
    const player=createEmbeddedAudio();
    player.pause();
    player.currentTime=0;
    player.muted=false;
    player.volume=1;
    const p=player.play();
    if(p) await p;
    running=true;
    message.textContent='スタート！';
    startBtn.textContent='演奏中…';
    raf=requestAnimationFrame(frame);
  }catch(err){
    console.error(err);
    running=false;
    message.textContent='この表示では再生できません。SafariでURLとして開いてください';
    startBtn.textContent='▶ もう一度スタート';
  }finally{
    startBtn.disabled=false;
    starting=false;
  }
}
startBtn.addEventListener('pointerup',start,{passive:false});

for(const type of ['don','ka']){
  const el=document.getElementById(type);
  const hit=e=>{e.preventDefault();playDonSound();judge(type)};
  el.addEventListener('pointerdown',hit,{passive:false});
}
document.addEventListener('keydown',e=>{if(e.repeat)return;if(e.code==='KeyF'||e.code==='Space'){e.preventDefault();playDonSound();judge('don')}if(e.code==='KeyJ'){e.preventDefault();playDonSound();judge('ka')}});
reset();

const pauseBtn=document.getElementById('pause');
const stopBtn=document.getElementById('stop');

pauseBtn.addEventListener('pointerup', async (e)=>{
  e.preventDefault();
  if(!audio){
    message.textContent='先にスタートを押してください';
    return;
  }
  if(audio.paused){
    try{
      await audio.play();
      running=true;
      pauseBtn.textContent='⏸ 一時停止';
      message.textContent='再開！';
      cancelAnimationFrame(raf);
      raf=requestAnimationFrame(frame);
    }catch(err){
      console.error(err);
      message.textContent='再開できませんでした';
    }
  }else{
    audio.pause();
    running=false;
    cancelAnimationFrame(raf);
    pauseBtn.textContent='▶ 再開';
    message.textContent='一時停止中';
  }
},{passive:false});

stopBtn.addEventListener('pointerup',(e)=>{
  e.preventDefault();
  cancelAnimationFrame(raf);
  running=false;
  starting=false;
  if(audio){
    audio.pause();
    audio.currentTime=0;
  }
  reset();
  message.textContent='停止しました';
  startBtn.textContent='▶ スタート';
  pauseBtn.textContent='⏸ 一時停止';
},{passive:false});

</script>
